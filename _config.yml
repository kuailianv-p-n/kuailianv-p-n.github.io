# Jekyll Configuration for News/Blog Theme
# SEO Optimized for Bing and Google

# Site Settings
title: "Kuailian VPN - News Center"
tagline: "Latest VPN Technology News and Industry Updates"
description: "Kuailian VPN Official News Center - Providing the latest VPN technology news, industry updates and expert analysis."
keywords: "VPN, technology, news, blog, VPN news, industry insights"
author: "Kuailian VPN"
email: "contact@kuailian.com"
url: "https://kuailianv-p-n.github.io"
baseurl: ""

# Logo and Branding
logo: "/assets/images/logo.png"
favicon: "/assets/images/favicon.ico"

# Social Links
social:
  twitter: "https://twitter.com/kuailian"
  facebook: "https://facebook.com/kuailian"
  instagram: "https://instagram.com/kuailian"
  linkedin: "https://linkedin.com/company/kuailian"
  github: "https://github.com/kuailian"
  telegram: "https://t.me/kuailian"

# IndexNow Configuration (for Bing and Yandex)
indexnow:
  enabled: true
  key: "YOUR_INDEXNOW_API_KEY"  # Replace with your actual API key
  host: "kuailianv-p-n.github.io"  # Replace with your domain

# Jekyll Settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate
  - jekyll-last-modified-at
  - jekyll-archives

# Pagination
paginate: 10
paginate_path: "/page/:num/"

# Archives
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: archive
    tag: archive
  permalinks:
    category: "/category/:name/"
    tag: "/tag/:name/"

# Collections
collections:
  authors:
    output: false

# Defaults
defaults:
  # Posts
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      comments: true
      toc: true
      breadcrumb: true
      related_posts: true
      author_box: true
  # Pages
  - scope:
      path: "_pages"
      type: "pages"
    values:
      layout: "page"
  # Authors
  - scope:
      path: "_authors"
      type: "authors"
    values:
      layout: "author"

# Exclude from processing
exclude:
  - .gitignore
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - node_modules
  - vendor
  - .jekyll-cache
  - .sass-cache

# Include in processing
include:
  - .htaccess
  - .nojekyll

# Build settings
timezone: "UTC"
future: false
show_drafts: false

# SEO Settings
seo:
  type: "NewsArticle"
  twitter:
    username: "@kuailian"
  facebook:
    admins: "YOUR_FACEBOOK_ADMIN_ID"
    app_id: "YOUR_FACEBOOK_APP_ID"

# Google Analytics
google_analytics: "G-XXXXXXXXXX"  # Replace with your Google Analytics ID

# Disqus Comments (optional)
disqus:
  shortname: "kuailian"

# Output settings
output_dir: "_site"
incremental: true
