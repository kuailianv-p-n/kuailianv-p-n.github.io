<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta name="keywords" content="VPN, 快连, 翻墙, 加速器">
    <meta name="author" content="{{ site.author }}">
    
    <!-- Open Graph -->
    <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
    <meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    
    {% seo %}
</head>
<body>
    <header>
        <div class="header-wrapper">
            <a href="/" class="logo">{{ site.title }}</a>
            <nav>
                <a href="/">首页</a>
                <a href="/news/">新闻快讯</a>
                <a href="#download" class="download-btn">立即下载</a>
            </nav>
        </div>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <div class="footer-wrapper">
            <div class="footer-grid">
                <div class="footer-section">
                    <h4>下载</h4>
                    <ul>
                        <li><a href="#">PC 版本</a></li>
                        <li><a href="#">Android 版本</a></li>
                        <li><a href="#">iOS 版本</a></li>
                        <li><a href="#">Mac 版本</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>关于</h4>
                    <ul>
                        <li><a href="#">关于我们</a></li>
                        <li><a href="#">联系我们</a></li>
                        <li><a href="#">新闻中心</a></li>
                        <li><a href="#">帮助中心</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>法律</h4>
                    <ul>
                        <li><a href="#">隐私权政策</a></li>
                        <li><a href="#">服务条款</a></li>
                        <li><a href="#">注册协议</a></li>
                        <li><a href="#">免责声明</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>其他</h4>
                    <ul>
                        <li><a href="#">Teams下载</a></li>
                        <li><a href="#">Gmail下载</a></li>
                        <li><a href="#">LINE下载</a></li>
                        <li><a href="#">谷歌验证器下载</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 {{ site.title }}. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
