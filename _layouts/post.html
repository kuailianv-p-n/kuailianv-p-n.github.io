---
layout: default
---

<article style="max-width: 900px; margin: 60px auto; padding: 0 20px;">
    <h1>{{ page.title }}</h1>
    
    <div style="color: #666; font-size: 14px; margin: 20px 0;">
        <span>作者: {{ page.author | default: site.author }}</span> | 
        <span>发布: {{ page.date | date: "%Y年%m月%d日" }}</span>
    </div>

    <div style="border-top: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; padding: 20px 0; margin: 30px 0;">
        {{ content }}
    </div>

    <div style="background: #f8f9fa; padding: 20px; border-radius: 8px; margin-top: 40px;">
        <h4>关于作者</h4>
        <p>{{ page.author | default: site.author }} - {{ site.description }}</p>
    </div>
</article>
